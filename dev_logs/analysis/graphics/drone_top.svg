                .cad-prop-fill { fill: rgba(100, 116, 139, 0.08); stroke: #64748b; stroke-width: 1.2px; stroke-dasharray: 4,3; }
                .cad-cage-line { stroke: #1e293b; fill: none; stroke-width: 1.8px; stroke-dasharray: 6,4; }
                .cad-hidden { display: none; }
