motion_capture_tracking_node:
  ros__parameters:
    type: "optitrack"
    hostname: "192.168.74.9"
    topics.frame_id: "world"
    topics.poses.qos.mode: "sensor"

    dynamics_configurations.default.max_velocity: [2.0,2.0,2.0]
    dynamics_configurations.default.max_angular_velocity: [3.14,3.14,3.14]
