    marker_configurations.drone_marker.points.1: [-0.05,0.03,0.0]
    marker_configurations.drone_marker.points.2: [0.00,-0.04,0.0]

    rigid_bodies.my_drone.initial_position: [0.0,0.0,0.0]
    rigid_bodies.my_drone.marker: "drone_marker"
    rigid_bodies.my_drone.dynamics: "default"